<VirtualHost *:80>
    ServerName safebackup.local

    DocumentRoot /var/www/html

    # Static par défaut dans /var/www/html (index.html, etc.)
    <Directory /var/www/html>
        Require all granted
        Options -Indexes +FollowSymLinks
        AllowOverride None
    </Directory>

    # Flask monté sous /api
    WSGIDaemonProcess vulnapp python-path=/var/www/app user=www-data group=www-data threads=5
    WSGIScriptAlias /api /var/www/app/vulnapp.wsgi

    <Directory /var/www/app>
        WSGIProcessGroup vulnapp
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>
</VirtualHost>
